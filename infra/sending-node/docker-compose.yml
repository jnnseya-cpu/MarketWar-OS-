# MarketWar OS dedicated sending node — docker-mailserver.
#
# Gives SASL-AUTHENTICATED submission on 587 (the app authenticates from Vercel
# over the public internet) and delivers DIRECT to recipient MX — no upstream
# relay, no third-party ESP. Built-in TLS via Let's Encrypt. The app already
# DKIM-signs per customer domain, so DKIM here stays OFF (no double-signing).
#
# Deploy:
#   1) point smtp.marketwaros.com A record at this VPS IP (DNS-only, not proxied)
#   2) docker compose up -d
#   3) docker exec -it mailserver setup email add appuser@marketwaros.com '<pass>'
#   4) set the app SMTP_USER=appuser@marketwaros.com / SMTP_PASS=<pass>
# See README.md for the full runbook (port 25, PTR, warm-up).

services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    # MUST match the A record and the PTR/reverse DNS exactly.
    hostname: smtp.marketwaros.com
    ports:
      - "25:25"     # outbound to recipient MX (and inbound bounces)
      - "587:587"   # submission — app authenticates here (STARTTLS + SASL)
      - "465:465"   # submissions — implicit TLS (optional)
    volumes:
      - ./dms/mail-data/:/var/mail/
      - ./dms/mail-state/:/var/mail-state/
      - ./dms/mail-logs/:/var/log/mail/
      - ./dms/config/:/tmp/docker-mailserver/
      - ./dms/letsencrypt/:/etc/letsencrypt/   # certs for smtp.marketwaros.com
      - /etc/localtime:/etc/localtime:ro
    environment:
      - SSL_TYPE=letsencrypt          # TLS on 587/465 (see README for cert step)
      - ENABLE_FAIL2BAN=1
      - POSTMASTER_ADDRESS=postmaster@marketwaros.com
      - ENABLE_OPENDKIM=0             # app signs per-domain; do NOT sign here
      - ENABLE_OPENDMARC=0
      - PERMIT_DOCKER=none
      - ONE_DIR=1
      - SPOOF_PROTECTION=0            # app sends AS many customer domains
    cap_add:
      - NET_ADMIN                     # fail2ban
    restart: always
