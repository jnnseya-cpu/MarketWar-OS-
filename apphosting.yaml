# Firebase App Hosting — MarketWar OS (Next.js 14, App Router).
#
# IMPORTANT: this app lives at the REPOSITORY ROOT (package.json, src/app,
# next.config are all here). In the App Hosting backend settings → Deployment
# tab, set the "Root directory" to "/" (or the repo root) — NOT "app/web".
# The "No buildable app found rooted at /workspace/app/web" error means the
# root directory is mis-pointed at a folder that does not exist.
#
# Build/run: App Hosting auto-detects Next.js from package.json ("next build").

runConfig:
  minInstances: 0
  maxInstances: 100
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

# Public (non-secret) build + runtime environment. The web Firebase API key and
# all real secrets (Firebase private key, Stripe secret + webhook secret, AI
# provider keys) are NOT committed — add them in Secret Manager and reference
# them here with `secret:` (see docs/DEPLOYMENT.md). Without them the app builds
# and runs in zero-config demo mode.
env:
  - variable: NEXT_PUBLIC_APP_URL
    value: https://marketwaros.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_PRODUCTION_URL
    value: https://marketwaros.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: studio-1718252475-c6017
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: studio-1718252475-c6017.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: studio-1718252475-c6017.firebasestorage.app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "221113093533"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:221113093533:web:26a80dc041406d66dc3374"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_URL
    value: https://studio-1718252475-c6017-default-rtdb.europe-west1.firebasedatabase.app
    availability: [BUILD, RUNTIME]
  # Web Firebase API key — enables real browser sign-up / login. A NEXT_PUBLIC_
  # var, so it must be available at BUILD (inlined into the client bundle).
  # Synced from the GitHub secret NEXT_PUBLIC_FIREBASE_API_KEY → firebase-web-api-key.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: firebase-web-api-key
    availability: [BUILD, RUNTIME]
  # Storage bucket (RUNTIME) — where live-rendered creatives are uploaded so
  # they get a hosted URL that can attach to social posts. Non-secret.
  - variable: FIREBASE_STORAGE_BUCKET
    value: studio-1718252475-c6017.firebasestorage.app
    availability: [RUNTIME]
  # Firebase Admin (server) — unlocks persistence, Firestore, Auth verification,
  # AND live image/video rendering (hosted media in Storage). The client_email
  # must match the service account that firebase-private-key was issued for.
  - variable: FIREBASE_CLIENT_EMAIL
    value: firebase-adminsdk-fbsvc@studio-1718252475-c6017.iam.gserviceaccount.com
    availability: [RUNTIME]
  - variable: FIREBASE_PRIVATE_KEY
    secret: firebase-private-key
    availability: [RUNTIME]
  # Stripe — real checkout, subscriptions and ACU top-ups.
  - variable: STRIPE_SECRET_KEY
    secret: stripe-secret-key
    availability: [RUNTIME]
  # STRIPE_WEBHOOK_SECRET enables automatic revenue/ACU attribution from paid
  # events. Uncomment ONLY after creating the secret (else the deploy fails):
  #   firebase apphosting:secrets:set stripe-webhook-secret
  # - variable: STRIPE_WEBHOOK_SECRET
  #   secret: stripe-webhook-secret
  #   availability: [RUNTIME]

  # ── Email / SMTP (the go-live sender — Brevo) ──────────────────────────
  # Non-secret settings are plain values. Port 587 = STARTTLS (Brevo default).
  - variable: SMTP_HOST
    value: smtp-relay.brevo.com
    availability: [RUNTIME]
  - variable: SMTP_PORT
    value: "587"
    availability: [RUNTIME]
  - variable: SMTP_SECURE
    value: "false"                          # "true" only for port 465 (implicit TLS)
    availability: [RUNTIME]
  - variable: EMAIL_FROM
    value: MarketWar OS <os@notifications.marketwaros.com>
    availability: [RUNTIME]
  # SMTP credentials are SECRETS — never plain values. Create them ONCE before
  # deploying (else the deploy fails on a missing secret):
  #   firebase apphosting:secrets:set smtp-user   # paste your Brevo login/email
  #   firebase apphosting:secrets:set smtp-pass   # paste a Brevo SMTP key
  #   (grantaccess is offered automatically — accept it). See docs/DEPLOYMENT.md.
  - variable: SMTP_USER
    secret: smtp-user
    availability: [RUNTIME]
  - variable: SMTP_PASS
    secret: smtp-pass
    availability: [RUNTIME]

  # ── AI providers — flips the WHOLE platform to Live intelligence ────────
  # Every agent + AI-generative engine routes through the gateway (Claude →
  # OpenAI → Gemini failover). Without these keys the OS still runs, returning
  # deterministic output labelled "Demo intelligence"; WITH them the same calls
  # go to the real models and are labelled "Live intelligence". These are the
  # keys that make real testing real. Create them ONCE before deploying:
  #   firebase apphosting:secrets:set anthropic-api-key
  #   firebase apphosting:secrets:set openai-api-key     # optional failover
  #   firebase apphosting:secrets:set gemini-api-key     # optional failover
  - variable: AI_GATEWAY_ORDER
    value: anthropic,openai,gemini
    availability: [RUNTIME]
  - variable: ANTHROPIC_API_KEY
    secret: anthropic-api-key
    availability: [RUNTIME]

  # ── Social publishing (Zernio — white-label, 15 channels) ───────────────
  # ONE platform key fans out to Instagram/TikTok/Facebook/YouTube/LinkedIn/X/
  # Pinterest and more. Each brand connects its OWN socials in one click (Zernio
  # hosts the per-platform OAuth, so MarketWar never does app review). Posting
  # runs through this platform account, billed as plan seats + ACU overflow.
  # Without the key the Publish Center runs in demo mode. Create the secret ONCE:
  #   firebase apphosting:secrets:set zernio-api-key
  - variable: ZERNIO_API_KEY
    secret: zernio-api-key
    availability: [RUNTIME]
  # OpenAI — AI failover AND photoreal image backgrounds (gpt-image-1) + Sora video.
  - variable: OPENAI_API_KEY
    secret: openai-api-key
    availability: [RUNTIME]
  # Gemini — AI failover AND Veo video render. Uncomment once its secret exists:
  #   firebase apphosting:secrets:set gemini-api-key
  # - variable: GEMINI_API_KEY
  #   secret: gemini-api-key
  #   availability: [RUNTIME]
