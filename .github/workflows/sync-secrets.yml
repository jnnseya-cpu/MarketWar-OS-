# Sync GitHub secrets → Google Secret Manager (the vault Firebase App Hosting
# reads at runtime). Manage keys in GitHub; run this workflow to push them across.
#
# WHY: App Hosting does NOT read GitHub secrets — it reads Secret Manager,
# referenced by name in apphosting.yaml. This workflow bridges the two.
#
# ONE-TIME SETUP (see docs/SECRET-SYNC.md for the click-by-click):
#   1. Create a Google service account with role "Secret Manager Admin" on the
#      project, download its JSON key, and add it as the GitHub secret GCP_SA_KEY.
#   2. Add each provider key as a GitHub secret (Settings → Secrets → Actions):
#      ANTHROPIC_API_KEY, OPENAI_API_KEY, ZERNIO_API_KEY, FIREBASE_PRIVATE_KEY,
#      STRIPE_SECRET_KEY  (add STRIPE_WEBHOOK_SECRET / GEMINI_API_KEY too if you have them).
#   3. (Optional but recommended) Add a repo VARIABLE APPHOSTING_SA = the App
#      Hosting backend's service account email, so this workflow also grants it
#      read access to each secret. Find it in docs/SECRET-SYNC.md.
#
# RUN IT: Actions tab → "Sync secrets to Secret Manager" → Run workflow.
# Re-run whenever you rotate a key. Then trigger an App Hosting rollout.

name: Sync secrets to Secret Manager

on:
  workflow_dispatch: {}   # manual only — run it when you set or rotate a key

permissions:
  contents: read

env:
  GCP_PROJECT: studio-1718252475-c6017

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Push secrets into Secret Manager
        env:
          # GitHub secret (UPPER_SNAKE)  →  used below as the value to sync.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
        run: |
          set -euo pipefail
          # sync <secret-manager-name> <value> — creates the secret if missing,
          # then adds a new version. Values are never echoed (and GitHub masks them).
          sync() {
            local name="$1"; local value="$2"
            if [ -z "$value" ]; then echo "· skip $name (no GitHub secret set)"; return 0; fi
            if ! gcloud secrets describe "$name" --project "$GCP_PROJECT" >/dev/null 2>&1; then
              gcloud secrets create "$name" --replication-policy=automatic --project "$GCP_PROJECT" >/dev/null
              echo "· created $name"
            fi
            printf '%s' "$value" | gcloud secrets versions add "$name" --data-file=- --project "$GCP_PROJECT" >/dev/null
            echo "✓ synced $name"
          }
          # Map: GitHub secret  →  Secret Manager name (must match apphosting.yaml).
          sync anthropic-api-key     "$ANTHROPIC_API_KEY"
          sync openai-api-key        "$OPENAI_API_KEY"
          sync zernio-api-key        "$ZERNIO_API_KEY"
          sync firebase-private-key  "$FIREBASE_PRIVATE_KEY"
          sync stripe-secret-key     "$STRIPE_SECRET_KEY"
          sync stripe-webhook-secret "$STRIPE_WEBHOOK_SECRET"
          sync gemini-api-key        "$GEMINI_API_KEY"
          sync firebase-web-api-key  "$NEXT_PUBLIC_FIREBASE_API_KEY"

      - name: Grant App Hosting read access (if APPHOSTING_SA is set)
        if: ${{ vars.APPHOSTING_SA != '' }}
        run: |
          set -euo pipefail
          for name in anthropic-api-key openai-api-key zernio-api-key firebase-private-key stripe-secret-key stripe-webhook-secret gemini-api-key firebase-web-api-key; do
            if gcloud secrets describe "$name" --project "$GCP_PROJECT" >/dev/null 2>&1; then
              gcloud secrets add-iam-policy-binding "$name" \
                --member="serviceAccount:${{ vars.APPHOSTING_SA }}" \
                --role="roles/secretmanager.secretAccessor" \
                --project "$GCP_PROJECT" >/dev/null && echo "✓ granted access to $name"
            fi
          done

      - name: Summary
        run: |
          echo "Done. Secrets are in Secret Manager. Now trigger an App Hosting rollout,"
          echo "then check https://marketwaros.com/api/health/live to confirm they're live."
